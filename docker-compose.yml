services:
  backend:
    build:
      context: ./backend
    container_name: ai-infrawatch-backend
    restart: unless-stopped
    env_file: 
      - ./backend/.env
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infrawatch-network

  frontend:
    build:
      context: .
    container_name: ai-infrawatch-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - infrawatch-network

  nginx:
    image: nginx:alpine
    container_name: ai-infrawatch-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - infrawatch-network

networks:
  infrawatch-network:
    driver: bridge